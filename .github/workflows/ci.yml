name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check . | tee ruff-report.txt
      - name: Test
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --junitxml=pytest-report.xml
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            coverage.xml
            pytest-report.xml
            ruff-report.txt

  mongodb-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run MongoDB bootstrap smoke tests
        env:
          APP_DATABASE_URL: mongomock://localhost/bulletin_board_ci
        run: pytest tests/integration/test_mongodb_bootstrap.py -q
